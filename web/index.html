<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPMNOS greedy run</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 60rem; }
    h1 { font-size: 1.25rem; }
    .controls { display: grid; gap: 0.75rem; margin-bottom: 1rem; }
    label { display: flex; gap: 0.5rem; align-items: center; }
    label span { width: 9rem; }
    button { padding: 0.5rem 1.25rem; font-size: 1rem; width: fit-content; }
    #status { margin: 0.75rem 0; font-family: monospace; white-space: pre-wrap; }
    #log { border: 1px solid gray; padding: 0.75rem; overflow: auto; max-height: 32rem;
           font-family: monospace; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>BPMNOS greedy run</h1>
  <p>Choose a BPMN model and an instance CSV, then run. Execution is driven by the engine's greedy
     controller with the guided evaluator; the monitor's JSON log is printed below.</p>

  <div class="controls">
    <label><span>BPMN model</span><input type="file" id="model" accept=".bpmn,.xml"></label>
    <label><span>Instance CSV</span><input type="file" id="instances" accept=".csv"></label>
    <label><span>Data provider</span>
      <select id="provider">
        <option value="static">static</option>
        <option value="expected">expected</option>
        <option value="stochastic">stochastic</option>
      </select>
    </label>
    <button id="run" disabled>Run</button>
  </div>

  <div id="status">loading module...</div>
  <pre id="log"></pre>

  <script type="module">
    import createBpmnos from './bpmnos.mjs';

    const $ = (id) => document.getElementById(id);
    let Module = null;

    createBpmnos().then((m) => {
      Module = m;
      $('run').disabled = false;
      $('status').textContent = 'module loaded; choose files and run';
    });

    function showError(message) {
      $('status').textContent = 'error: ' + message;
      $('log').textContent = '';
    }

    $('run').addEventListener('click', async () => {
      const modelFile = $('model').files[0];
      const instanceFile = $('instances').files[0];
      if (!modelFile || !instanceFile) {
        showError('choose both a BPMN model and an instance CSV');
        return;
      }
      const modelXml = await modelFile.text();
      const instanceCsv = await instanceFile.text();

      // No controller is attached, so the engine runs autonomously under the greedy controller.
      const engine = new Module.Engine();
      const monitor = new Module.Monitor();
      engine.attachMonitor(monitor);

      let result = JSON.parse(engine.loadModel(modelXml));
      if (result.error) return showError(result.error);
      result = JSON.parse(engine.loadInstances(instanceCsv));
      if (result.error) return showError(result.error);
      engine.configure(JSON.stringify({ provider: $('provider').value }));

      const snapshot = JSON.parse(engine.start());
      if (snapshot.error) return showError(snapshot.error);

      $('status').textContent =
        'outcome: ' + snapshot.outcome +
        '\nobjective: ' + snapshot.objective +
        '\nfinal time: ' + snapshot.time +
        '\nlog entries: ' + snapshot.log.length;
      $('log').textContent = JSON.stringify(snapshot.log, null, 2);
    });
  </script>
</body>
</html>
