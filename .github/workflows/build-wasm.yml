name: wasm

# The slow half. It fetches xerces, bpmn++, and the engine from source, cross compiles the module,
# and publishes the built module together with the package definition and types to the dist branch.
# That branch is the built artifact: the Pages deploy reads it, and other repositories, such as the
# workbench, consume it as a package with github:bpmn-os/bpmnos-wasm#dist. Because the build is
# expensive it runs only when the bridge or the build description changes on main, and on manual
# request from any branch, which is how a development build is refreshed without running on every
# push. The cross-compiled dependencies are cached and rebuilt only when a dependency changes, so a
# bridge-only change recompiles just the bridge.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'package.json'
      - 'types/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-wasm
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # schematic++ is the host code generator that the engine and bpmn++ run during their build to
      # emit their XML parsers. The engine assumes it is present, as it assumes any code generator,
      # so a build environment provides it. It is a small native CMake tool whose only dependency is
      # native xerces-c, so build and install it here with the host compiler; it must run on the
      # runner. This is the one native dependency an Emscripten cross build cannot avoid, since the
      # generator needs an XSD parser on the host.
      - name: Install schematic++
        run: |
          sudo apt-get update
          sudo apt-get install -y libxerces-c-dev
          git clone --depth 1 https://github.com/rajgoel/schematicpp /tmp/schematicpp
          cmake -S /tmp/schematicpp -B /tmp/schematicpp/build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/schematicpp/build -j"$(nproc)"
          sudo cmake --install /tmp/schematicpp/build
          command -v schematic++

      # Emscripten is installed at the fixed path $HOME/emsdk, not a per-run temporary directory, so the
      # absolute toolchain path that CMake records in the configured build tree stays valid across runs
      # and a restored dependency build reconfigures instead of failing. The install is cached under a
      # constant key, which freezes the toolchain version until the key is bumped, so the dependency
      # cache below is not invalidated by the moving "latest" release. Bump emsdk-v1 to take a newer
      # toolchain.
      - name: Restore Emscripten
        id: emsdk
        uses: actions/cache/restore@v4
        with:
          path: ~/emsdk
          key: emsdk-v1-${{ runner.os }}

      - name: Set up Emscripten
        run: |
          if [ ! -x "$HOME/emsdk/emsdk" ]; then
            git clone https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
            "$HOME/emsdk/emsdk" install latest
            "$HOME/emsdk/emsdk" activate latest
          fi
          # Export the toolchain to every later step through the fixed install path. emsdk_env.sh leaves
          # EM_CONFIG empty on current Emscripten, so point it at the .emscripten config that activate
          # writes under $EMSDK; that config carries the absolute paths to binaryen, llvm, and node, all
          # under the fixed install path, so a build finds wasm-opt without them being on PATH.
          source "$HOME/emsdk/emsdk_env.sh"
          {
            echo "PATH=$PATH"
            echo "EMSDK=$EMSDK"
            echo "EM_CONFIG=${EM_CONFIG:-$HOME/emsdk/.emscripten}"
          } >> "$GITHUB_ENV"
          emcc --version | head -1
          test -f "${EM_CONFIG:-$HOME/emsdk/.emscripten}"

      - name: Save Emscripten
        if: steps.emsdk.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/emsdk
          key: emsdk-v1-${{ runner.os }}

      # Cache the cross-compiled xerces, bpmn++, and engine. The key carries the resolved commit of each
      # moving dependency and the Emscripten version, so an upstream advance or a toolchain bump misses
      # the cache and rebuilds from source; a bridge-only change hits it and recompiles just the bridge.
      # The build configuration is not in the key, because the configured tree is reconfigured on every
      # run and a bridge-side configuration change, such as the export name, does not affect the
      # dependencies. Bump the v2 prefix to invalidate every entry by hand.
      - name: Resolve dependency versions
        id: deps
        run: |
          {
            echo "engine=$(git ls-remote https://github.com/bpmn-os/bpmnos-engine.git main | cut -f1)"
            echo "bpmnpp=$(git ls-remote https://github.com/bpmn-os/bpmnpp.git main | cut -f1)"
            echo "schematicpp=$(git ls-remote https://github.com/rajgoel/schematicpp HEAD | cut -f1)"
            echo "emcc=$(emcc --version | head -1 | md5sum | cut -c1-8)"
          } >> "$GITHUB_OUTPUT"

      - name: Restore the dependency build
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: build-wasm
          key: wasm-deps-v2-${{ runner.os }}-${{ steps.deps.outputs.engine }}-${{ steps.deps.outputs.bpmnpp }}-${{ steps.deps.outputs.schematicpp }}-${{ steps.deps.outputs.emcc }}

      - name: Build the module
        run: |
          emcmake cmake -S . -B build-wasm
          cmake --build build-wasm --target bpmnos_module -j"$(nproc)"

      # Save only on a miss and only when the build above succeeded, so a broken build never poisons the
      # cache.
      - name: Save the dependency build
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: build-wasm
          key: ${{ steps.cache.outputs.cache-primary-key }}

      - name: Assemble the package
        run: |
          rm -rf package && mkdir -p package/dist package/types
          cp dist/bpmnos.mjs dist/bpmnos.wasm package/dist/
          cp types/bpmnos.d.ts package/types/
          cp package.json package/
          cp README.md package/ 2>/dev/null || true

      - name: Publish to the dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: dist
          publish_dir: ./package
          force_orphan: true
          commit_message: "build: publish module from ${{ github.sha }}"
