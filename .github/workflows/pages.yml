name: Deploy demo to Pages

# The fast half. It does no compilation: it takes the built module from the dist branch and the web
# directory from the triggering branch and publishes them to GitHub Pages. It runs automatically on
# any push to main, after the build workflow refreshes the module on main, and on manual request
# from any branch so a work-in-progress preview can be deployed from develop on demand. Because
# Pages has a single site, every deploy publishes to the same URL; a manual develop deploy is a
# temporary preview that the next main deploy overwrites. The dist branch must exist first, so run
# the build workflow once before the first deploy. Enable Pages in the repository settings with the
# source set to GitHub Actions.

on:
  # A demo-only change on main deploys directly and fast. A source change instead triggers the
  # build workflow, and this deploy then runs on that workflow's completion, so the two never run
  # at the same time. Manual dispatch previews any branch on demand.
  push:
    branches: [main]
    paths:
      - 'demo/**'
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and publish wasm module"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-site:
    # For an automatic run after the build workflow, only proceed when that build succeeded on main.
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Check out the page from the triggering branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}

      - name: Check out the built module from the dist branch
        uses: actions/checkout@v4
        with:
          ref: dist
          path: _dist

      - name: Assemble the site
        run: |
          mkdir -p site/samples
          cp demo/index.html demo/worker.mjs site/
          cp demo/samples/* site/samples/
          cp _dist/dist/bpmnos.mjs _dist/dist/bpmnos.wasm site/

      - name: Upload the site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
